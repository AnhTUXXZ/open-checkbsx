<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Bãi Xe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tùy chỉnh thanh cuộn cho khu vực preview và danh sách */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background-color: transparent;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-6 font-sans">

    <div class="max-w-[1400px] mx-auto grid grid-cols-1 xl:grid-cols-12 gap-6 items-start">
        
        <div class="xl:col-span-7 w-full flex flex-col gap-6">
            
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
                <div class="relative h-32 bg-blue-900 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1573348722427-f1d6819fdf98?auto=format&fit=crop&w=1000&q=80" 
                         alt="Parking Background" 
                         class="absolute inset-0 w-full h-full object-cover opacity-30 mix-blend-overlay">
                    
                    <div class="absolute inset-0 p-5 flex justify-between items-center">
                        <div>
                            <h1 class="text-white text-xl md:text-2xl font-bold drop-shadow-md">HỆ THỐNG QUẢN LÝ BÃI XE</h1>
                            <p class="text-blue-100 text-sm mt-1 drop-shadow-md">Phát triển bởi Đội CNTT</p>
                        </div>
                        <div class="hidden sm:block border border-white/60 bg-white/10 text-white text-xs font-semibold px-4 py-1.5 rounded-full backdrop-blur-sm shadow-sm">
                            MÁY QUÉT CAO CẤP
                        </div>
                    </div>
                </div>

                <div class="p-6">
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <label for="file-upload" class="border-2 border-dashed border-gray-300 rounded-xl p-4 flex flex-col items-center justify-center cursor-pointer hover:bg-blue-50 hover:border-blue-300 transition-all duration-200 group">
                            <span class="text-3xl mb-2 group-hover:scale-110 transition-transform">📁</span>
                            <span class="text-sm font-bold text-gray-700">Tải Ảnh Lên</span>
                            <input id="file-upload" type="file" multiple accept="image/*" class="hidden" />
                        </label>
                        
                        <button onclick="window.location.href='/cam'" class="border-2 border-dashed border-gray-300 rounded-xl p-4 flex flex-col items-center justify-center hover:bg-gray-50 hover:border-gray-400 transition-all duration-200 group">
                            <span class="text-3xl mb-2 group-hover:scale-110 transition-transform">📷</span>
                            <span class="text-sm font-bold text-gray-700">Mở Máy Ảnh</span>
                        </button>
                    </div>

                    <div id="preview-container" class="border border-gray-200 rounded-xl h-56 mb-6 flex flex-wrap gap-2 items-center justify-center bg-gray-50 p-2 overflow-y-auto custom-scrollbar">
                        <span class="text-gray-400 text-sm">Ảnh đã chọn sẽ hiển thị tại đây</span>
                    </div>

                    <button id="upload-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-xl shadow-lg hover:shadow-xl transition-all duration-200 disabled:bg-gray-400 flex items-center justify-center text-lg">
                        <span class="mr-2">🚀</span> QUÉT BIỂN SỐ NGAY
                    </button>
                </div>
            </div>

            <div id="results-wrapper" class="hidden bg-white rounded-2xl shadow-xl border border-gray-200 p-6">
                <h3 class="text-gray-800 text-lg font-bold mb-4 flex items-center">
                    <span class="w-2 h-6 bg-blue-500 rounded mr-2"></span> Kết Quả Nhận Diện
                </h3>
                <div id="results" class="space-y-4">
                    </div>
            </div>

        </div>


        <div class="xl:col-span-5 w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200 p-6 flex flex-col h-[calc(100vh-3rem)] sticky top-6">
            
            <div class="grid grid-cols-2 gap-4 mb-6 shrink-0">
                <div class="bg-blue-50 border border-blue-100 p-4 rounded-xl shadow-sm text-center">
                    <h3 class="text-blue-600 font-bold text-xs uppercase tracking-wider mb-1">Xe Đang Trong Bãi</h3>
                    <p id="stat-inside" class="text-4xl font-black text-blue-900">0</p>
                </div>
                <div class="bg-green-50 border border-green-100 p-4 rounded-xl shadow-sm text-center">
                    <h3 class="text-green-600 font-bold text-xs uppercase tracking-wider mb-1">Lượt Ra Hôm Nay</h3>
                    <p id="stat-out" class="text-4xl font-black text-green-900">0</p>
                </div>
            </div>

            <hr class="border-gray-200 mb-4">

            <div class="flex-1 overflow-y-auto custom-scrollbar pr-2 space-y-6">
                
                <div>
                    <h3 class="text-gray-800 font-bold mb-3 flex items-center justify-between">
                        <div class="flex items-center">
                            <span class="w-2 h-5 bg-green-500 rounded mr-2"></span> Xe Vừa Xuất Bến
                        </div>
                        <span class="text-xs font-normal text-gray-500">Gần nhất</span>
                    </h3>
                    <div id="list-out" class="space-y-2">
                        <p class="text-sm text-gray-400 text-center py-2 italic">Đang tải dữ liệu...</p>
                    </div>
                </div>

                <div>
                    <h3 class="text-gray-800 font-bold mb-3 flex items-center justify-between">
                        <div class="flex items-center">
                            <span class="w-2 h-5 bg-blue-500 rounded mr-2"></span> Danh Sách Trong Bãi
                        </div>
                    </h3>
                    <div id="list-in" class="space-y-2">
                        <p class="text-sm text-gray-400 text-center py-2 italic">Đang tải dữ liệu...</p>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        const fileInput = document.getElementById('file-upload');
        const uploadBtn = document.getElementById('upload-btn');
        const resultsDiv = document.getElementById('results');
        const resultsWrapper = document.getElementById('results-wrapper');
        const previewContainer = document.getElementById('preview-container');
        
        const statInside = document.getElementById('stat-inside');
        const statOut = document.getElementById('stat-out');
        const listIn = document.getElementById('list-in');
        const listOut = document.getElementById('list-out');

        // Hàm cập nhật thống kê và render danh sách bên phải
        async function fetchStats() {
            try {
                const response = await fetch('/api/admin-data');
                const data = await response.json();
                
                // Cập nhật số tổng
                statInside.innerText = data.inside || 0;
                statOut.innerText = data.out_today || 0;

                // Render danh sách xe TRONG BÃI
                if (data.logs_in && data.logs_in.length > 0) {
                    listIn.innerHTML = data.logs_in.map(log => `
                        <div class="flex justify-between items-center bg-gray-50 hover:bg-gray-100 transition-colors p-3 rounded-lg border border-gray-200">
                            <div class="flex items-center gap-3">
                                <span class="font-mono font-bold text-gray-800 border-2 border-gray-400 px-2 py-0.5 rounded bg-white tracking-wider">${log.plate}</span>
                            </div>
                            <span class="text-xs font-medium text-gray-500">${log.time_in}</span>
                        </div>
                    `).join('');
                } else {
                    listIn.innerHTML = '<p class="text-sm text-gray-400 text-center py-4 bg-gray-50 rounded-lg border border-dashed border-gray-200">Trống</p>';
                }

                // Render danh sách xe VỪA RA (Có số tiền)
                if (data.logs_out && data.logs_out.length > 0) {
                    listOut.innerHTML = data.logs_out.map(log => `
                        <div class="flex justify-between items-center bg-green-50 hover:bg-green-100 transition-colors p-3 rounded-lg border border-green-200">
                            <div class="flex flex-col">
                                <span class="font-mono font-bold text-gray-800 border-2 border-gray-400 px-2 py-0.5 rounded bg-white tracking-wider inline-block w-max">${log.plate}</span>
                                <span class="text-xs text-green-700 mt-1 font-semibold flex items-center"><svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> ${log.duration}</span>
                            </div>
                            <span class="text-lg font-black text-green-700">${log.fee}</span>
                        </div>
                    `).join('');
                } else {
                    listOut.innerHTML = '<p class="text-sm text-gray-400 text-center py-4 bg-gray-50 rounded-lg border border-dashed border-gray-200">Chưa có giao dịch gần đây</p>';
                }

            } catch (error) {
                console.error("Không thể lấy dữ liệu thống kê", error);
            }
        }

        // Lấy thống kê ngay khi load trang và thiết lập tự động cập nhật mỗi 5 giây
        fetchStats();
        setInterval(fetchStats, 5000);

        // Hiển thị Preview ảnh ngay khi người dùng chọn file
        fileInput.addEventListener('change', function() {
            previewContainer.innerHTML = ''; 
            
            if (this.files && this.files.length > 0) {
                Array.from(this.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.className = this.files?.length > 1 ? 'h-full object-contain max-w-[48%] rounded border border-gray-300 shadow-sm' : 'h-full object-contain max-w-full rounded border border-gray-300 shadow-sm';
                        previewContainer.appendChild(img);
                    }.bind(this);
                    reader.readAsDataURL(file);
                });
            } else {
                previewContainer.innerHTML = '<span class="text-gray-400 text-sm">Ảnh đã chọn sẽ hiển thị tại đây</span>';
            }
        });

        // Xử lý gửi ảnh lên Server 
        uploadBtn.addEventListener('click', async () => {
            const files = fileInput.files;
            if (files.length === 0) {
                alert("Vui lòng chọn ít nhất 1 ảnh!");
                return;
            }

            uploadBtn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> ĐANG XỬ LÝ...`;
            uploadBtn.disabled = true;
            resultsDiv.innerHTML = ""; 
            resultsWrapper.classList.remove('hidden');

            const formData = new FormData();
            for (let i = 0; i < files.length; i++) {
                formData.append('images', files[i]);
            }

            try {
                const response = await fetch('/upload-ocr', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.results) {
                    data.results.forEach((item, index) => {
                        if (item.error) {
                            resultsDiv.innerHTML += `
                                <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded shadow-sm">
                                    <p class="text-red-700 font-bold">Lỗi ở ảnh ${index + 1}</p>
                                    <p class="text-red-600 text-sm">${item.error}</p>
                                </div>
                            `;
                        } else {
                            resultsDiv.innerHTML += `
                                <div class="bg-gray-50 border border-gray-200 p-4 rounded-xl shadow-sm flex flex-col sm:flex-row gap-4 items-center transition-all hover:shadow-md">
                                    <img src="data:image/jpeg;base64,${item.image_base64}" class="w-full sm:w-48 h-auto rounded-lg border border-gray-300 object-cover shadow-sm">
                                    <div class="flex-1 w-full text-center sm:text-left">
                                        <div class="inline-block ${item.status === 'VÔ' ? 'bg-blue-100 text-blue-800' : 'bg-green-100 text-green-800'} text-xs px-2 py-1 rounded mb-2 font-semibold tracking-wide shadow-sm">
                                            ${item.status === 'VÔ' ? '📥 MỚI VÀO BÃI' : '📤 XE XUẤT BẾN'}
                                        </div>
                                        <h2 class="text-3xl font-black text-gray-800 tracking-widest font-mono border-2 border-gray-400 inline-block px-3 py-1 bg-white rounded">${item.plate}</h2>
                                        <p class="text-sm text-gray-500 mt-2">🕒 ${item.time}</p>
                                        
                                        ${item.status === 'RA' ? 
                                        `<div class="mt-3 bg-white border-2 border-green-200 p-3 rounded-lg text-green-700 font-bold text-sm shadow-sm flex justify-between items-center">
                                            <span>Thời gian: ${item.duration}</span>
                                            <span class="text-lg">Phí: ${item.fee.toLocaleString()} VNĐ</span>
                                        </div>` : 
                                        `<div class="mt-3 bg-white border-2 border-blue-200 p-3 rounded-lg text-blue-700 font-bold text-sm shadow-sm">
                                            ${item.message}
                                        </div>`}
                                    </div>
                                </div>
                            `;
                        }
                    });
                }
                
                // Cập nhật lại cột dữ liệu bên phải ngay sau khi quét xong
                fetchStats();

            } catch (error) {
                alert("Lỗi kết nối đến máy chủ!");
            }

            uploadBtn.innerHTML = `<span class="mr-2">🚀</span> QUÉT BIỂN SỐ NGAY`;
            uploadBtn.disabled = false;
        });
    </script>
</body>
</html>
